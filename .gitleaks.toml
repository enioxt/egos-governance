# .gitleaks.toml — EGOS-PUBLIC custom rules
#
# Identity-specific detection (client names, institutional/police vocabulary,
# phone numbers, VPS IPs, internal domains) is intentionally NOT defined here:
# a public rules file that names those terms would itself reveal exactly what is
# being hidden (COI-SCAN-GATE-001). That detection runs PRE-PUBLICATION in the
# private kernel — see scripts/extract-public.ts, which loads the private denylist
# from KERNEL_ROOT/.coi-denylist.json (gitignored, never pushed). gitleaks' own
# default ruleset (AWS/GitHub/etc.) still runs on top of the generic rule below.
title = "EGOS Public — Secret Detection Rules"

[[rules]]
id = "egos-jwt-supabase"
description = "Supabase JWT token"
regex = '''eyJhbGc[A-Za-z0-9._-]{50,}'''
tags = ["jwt", "supabase"]

[allowlist]
description = "Files that may contain detection patterns for legitimate reasons"
paths = [
  ".gitleaks.toml",
  "scripts/extract-public.ts",
  "EXTRACT_MANIFEST.yaml",
  "docs/incidents/*.md"
]
