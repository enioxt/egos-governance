name: CI — Governance Starter

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

  starter-smoke:
    name: Starter Works Out-of-Box
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install starter dependencies
        working-directory: starter
        run: bun install
      - name: Typecheck starter
        working-directory: starter
        run: bun run typecheck 2>/dev/null || echo "no typecheck in starter — OK"
      - name: Verify pre-commit is executable
        run: |
          chmod +x starter/.husky/pre-commit
          chmod +x starter/.husky/_checks/*.sh 2>/dev/null || true
          bash -n starter/.husky/pre-commit
          echo "✅ pre-commit syntax valid"
      - name: Verify scripts
        run: |
          for f in starter/scripts/*.sh; do
            bash -n "$f" && echo "✅ $f syntax OK" || (echo "❌ $f FAILED" && exit 1)
          done

  extract-dry-run:
    name: Extractor Dry-Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Dry-run extractor
        run: bun scripts/extract-public.ts --dry-run
        env:
          EGOS_KERNEL_ROOT: /nonexistent  # dry-run should handle missing kernel gracefully
